app:
  name: Taiwan Stock AI Screener
  version: 3.0.0
  timezone: Asia/Taipei
  sample_mode: true

database:
  url: sqlite:///./data/taiwan_stock_screener.db

api:
  cors_origins:
    - http://localhost:5000
    - http://localhost:5173
    - http://127.0.0.1:5000
    - http://127.0.0.1:5173

http:
  timeout_seconds: 20
  retries: 3
  backoff_seconds: 0.6

sources:
  twse:
    stock_day_all_url: https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL
    institutional_url: https://openapi.twse.com.tw/v1/fund/T86
  tpex:
    daily_quotes_url: https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes
  finmind:
    base_url: https://api.finmindtrade.com/api/v4/data
  mops:
    monthly_revenue_url: https://mops.twse.com.tw/nas/t21/sii/t21sc03_{year}_{month}.html
  fred:
    base_url: https://api.stlouisfed.org/fred/series/observations

thresholds:
  candidate_score: 85
  close_above_ma: 20
  ma20_slope_days: 5
  ma60_slope_days: 10
  near_high_lookback_days: 60
  near_high_pct: 8
  volume_ma_days: 20
  volume_ratio: 1.5
  turnover_min_twd: 500000000
  institutional_days: 3
  institutional_buy_ratio_pct: 3
  revenue_yoy_pct: 15
  eps_min: 0
  roe_min_pct: 10
  risk_reward_min: 2

scoring:
  trend: 25
  volume: 15
  institutional: 20
  chip: 10
  fundamental: 15
  industry: 10
  risk_reward: 5

left_side:
  candidate_score: 70
  thresholds:
    low_base_from_high_pct: 25
    bb_squeeze_lookback_days: 120
    bb_squeeze_percentile: 25
    bb_squeeze_extreme_percentile: 10
    stabilize_ma_days: 20
    ignition_volume_avg_days: 5
    ignition_volume_min_ratio: 1.5
    ignition_volume_max_ratio: 3
    short_balance_lookback_days: 20
    short_balance_drop_pct: 15
    margin_lookback_days: 20
    margin_drop_pct: 10
    day_trade_ratio_max_pct: 10
    volume_dryup_ratio: 0.75
    holder_lookback_weeks: 8
    holder_ratio_gain_pp: 0.5
    trust_days: 10
    trust_streak_days: 3
    trust_streak_window: 5
    revenue_yoy_floor_pct: -20
    catalyst_lookahead_trading_days: 10
    sector_rank_threshold_pct: 20
    sector_turnover_jump_pct: 50
    short_margin_ratio_squeeze_pct: 30
    branch_top_n: 10
    branch_concentration_pct: 50
    branch_streak_days: 3
    branch_churn_max_ratio_pct: 15
    branch_lookback_days: 5
    microstructure_strategy_points: 15
    window_dressing_days_to_quarter_end: 20
    window_dressing_trust_holding_min_pct: 3
    window_dressing_trust_holding_max_pct: 8
    disposition_days_to_end: 2
    disposition_max_range_pct: 15
    cb_squeeze_percentile: 10
    cb_price_breakout: 105
    cb_volume_ratio: 3
    geo_branch_streak_days: 5
    geo_branch_volume_pct: 10
    # 訊號加速：評分較前次出現大幅跳升（起手式完成的樣子，如 2493 漲停前 23.5→63.5）
    acceleration_min_delta: 20
    acceleration_window_days: 5
    acceleration_min_score: 45
    # 深度洗盤：空單回補＋融資大減「同時且夠深」——回測驗證的左側高勝率組合
    # （2493 揚博／3189 景碩／3443 創意／8105 凌巨 起漲前共同特徵）。
    # 門檻略高於各自單獨訊號（15/10），要兩者同時深跌才給加分與獨立標記。
    washout_short_drop_pct: 20
    washout_margin_drop_pct: 12
    washout_combo_bonus: 10
  # 知名隔日沖分點黑名單（正規化子字串比對，可自行增刪）
  day_trade_branch_blacklist:
    - 凱基-松山
    - 元大-土城永寧
  weights:
    base_structure: 20
    ignition: 10
    short_covering: 15
    retail_capitulation: 10
    smart_money: 15
    fundamental_safety: 10
    catalyst: 10
    sector_resonance: 10
    microstructure: 15
    sentiment: 0

trade_plan:
  atr_stop_multiplier: 1.5
  first_target_r_multiple: 2
  second_target_r_multiple: 3
  fallback_stop_pct: 6
  max_position_pct: 20

jobs:
  daily_update_time: "08:00"
