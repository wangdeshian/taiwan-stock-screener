name: Daily Stock Screener

on:
  schedule:
    # Taiwan market daily refresh, Monday-Friday, 15:10 Asia/Taipei.
    - cron: "10 7 * * 1-5"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even on weekends/non-trading days"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          SCREENER_FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || 'false' }}
        run: python scripts/run_screener.py

      - name: Commit generated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data/results.json frontend/data/history.json
          git diff --staged --quiet || git commit -m "chore: update screener results"
          git push

      - name: Publish generated data to GitHub Pages
        run: |
          git fetch origin gh-pages:gh-pages
          git worktree add ../pages gh-pages
          mkdir -p ../pages/data
          cp frontend/data/results.json ../pages/data/results.json
          cp frontend/data/history.json ../pages/data/history.json
          cd ../pages
          git add data/results.json data/history.json
          git diff --staged --quiet || git commit -m "chore: update published screener data"
          git push origin gh-pages
